<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      if (typeof global === 'undefined') {
        window.global = window;
      }
      if (typeof process === 'undefined') {
        window.process = { env: {}, browser: true, version: '', versions: {} };
      }
      // Gracefully capture and suppress anonymous/cross-origin "Script error." events
      // that are caused by standard browser extensions or parent-iframe tracking scripts.
      window.addEventListener('error', function (e) {
        var message = e.message || '';
        var filename = e.filename || '';
        if (message === 'Script error.' || !filename || filename.indexOf(window.location.host) === -1) {
          e.preventDefault();
          e.stopImmediatePropagation();
          return true;
        }
      }, true);

      window.onerror = function (message, url, line, col, error) {
        if (message === 'Script error.' || !url || url.indexOf(window.location.host) === -1) {
          return true; // Prevents default browser handling
        }
        return false;
      };

      window.addEventListener('unhandledrejection', function (event) {
        // Prevent telemetry tracking for background external promises
        var reasonStr = String(event.reason || '');
        if (reasonStr.indexOf('extension') !== -1 || reasonStr.indexOf('Google') !== -1) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);
    </script>
    <title>Salary Pro FFPL</title>
    <!-- Favicon and App Icons for web, iOS, and Android -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-title" content="Salary Pro FFPL" />
    <meta name="application-name" content="Salary Pro FFPL" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0da16e" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
