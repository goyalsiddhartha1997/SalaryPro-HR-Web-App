<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rounded Background -->
  <rect width="100" height="100" rx="22" fill="#0da16e" />
  
  <!-- Icon Group transformed for centering -->
  <g stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Bill 1 (Backmost) -->
    <g transform="rotate(-30 40 60)">
      <rect x="35" y="15" width="28" height="46" rx="2" stroke="#000000" stroke-width="3" fill="none" />
      <rect x="38" y="18" width="22" height="40" rx="1" stroke="#000000" stroke-width="1.2" fill="none" />
    </g>
    <!-- Bill 2 (Middle) -->
    <g transform="rotate(-15 45 65)">
      <rect x="38" y="15" width="28" height="46" rx="2" stroke="#000000" stroke-width="3" fill="none" />
      <rect x="41" y="18" width="22" height="40" rx="1" stroke="#000000" stroke-width="1.2" fill="none" />
    </g>
    <!-- Bill 3 (Frontmost - detailed) -->
    <g>
      <rect x="48" y="16" width="30" height="48" rx="2.5" stroke="#000000" stroke-width="3" fill="none" />
      <rect x="51" y="19" width="24" height="42" rx="1.5" stroke="#000000" stroke-width="1.2" fill="none" />
      <!-- Top ornamental lines || -->
      <line x1="59" y1="23" x2="59" y2="28" stroke="#000000" stroke-width="1.8" />
      <line x1="63" y1="23" x2="63" y2="28" stroke="#000000" stroke-width="1.8" />
      <!-- Bottom ornamental lines || -->
      <line x1="59" y1="52" x2="59" y2="57" stroke="#000000" stroke-width="1.8" />
      <line x1="63" y1="52" x2="63" y2="57" stroke="#000000" stroke-width="1.8" />
      <!-- Center watermark circle -->
      <circle cx="61" cy="40" r="5.5" stroke="#000000" stroke-width="1.8" fill="none" />
    </g>
  </g>
</svg>
